<app-hardware-sign *ngIf="showHardwareSign" [chainType]="chainType" [currentWallet]="currentWallet"
  [unsignedTx]="hexMessage" [magicNumber]="n3Network.magicNumber" [signOnly]="true"
  (backWithSignedTx)="handleHardwareSignedTx($event)"></app-hardware-sign>

<div class="container">
  <div class="header">
    <div class="invoke-type">
      · {{ "SIGNMESSAGE" }}
    </div>
    <p class="title">{{ "thSignTitle" | translate | async }}</p>
    <p class="warning">
      {{ "evmSignWarning" | translate | async }}
    </p>
    <p class="account">
      <img [avatar]="address" />{{ address | longStr : 10 }}
    </p>
  </div>
  <div class="content">
    <p class="hex-label">{{ "message" | translate | async }}</p>
    <p class="json-box serialize">{{ displayMessage }}</p>
  </div>
  <div class="btn-group">
    <button class="cancel" (click)="cancel()">
      {{ "cancel" | translate | async }}
    </button>
    <button class="confirm" (click)="signature()">
      {{ "yes" | translate | async }}
    </button>
  </div>
</div>
